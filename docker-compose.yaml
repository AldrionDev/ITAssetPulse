services:
  mongodb:
    image: mongo:6.0
    container_name: asset-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - asset-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asset-backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/asset-manager
    networks:
      - asset-network
    depends_on:
      mongodb:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: asset-frontend
    ports:
      - "5173:5173"
    networks:
      - asset-network
    depends_on:
      - backend
    restart: always
networks:
  asset-network:
    driver: bridge

volumes:
  mongo-data:
